# Translator output for scenario 08.
#
# The translator detects the implicit default-policy activation (presence of
# at least one fallback-group upstream) and synthesizes an explicit
# `selectionPolicy.eval` that preserves the ROUTING_POLICY_* env-var
# semantics. New stdlib calls (`removeByErrorRate`, `removeByLag`,
# `preferGroup`, `sortByScore`, `stickyPrimary`, `probeExcluded`) replace
# the legacy filter+fallback logic but produce identical eligibility for
# the same env-var values.

projects:
  - id: main
    upstreams:
      - id: rpc1
        endpoint: http://rpc1.localhost
        type: evm
        evm:
          chainId: 123
      - id: rpc2
        endpoint: http://rpc2.localhost
        type: evm
        evm:
          chainId: 123
      - id: rpc3
        group: fallback
        endpoint: http://rpc3.localhost
        type: evm
        evm:
          chainId: 123
    networks:
      - architecture: evm
        evm:
          chainId: 123
        selectionPolicy:
          evalInterval: 1s
          eval: |
            (upstreams, ctx) => {
              const maxErrorRate    = parseFloat(process.env.ROUTING_POLICY_MAX_ERROR_RATE        || '0.7');
              const maxBlockHeadLag = parseFloat(process.env.ROUTING_POLICY_MAX_BLOCK_HEAD_LAG    || '10');
              const minHealthy      = parseInt  (process.env.ROUTING_POLICY_MIN_HEALTHY_THRESHOLD || '1');
              return upstreams
                .removeByErrorRate(maxErrorRate)
                .removeByLag({ blockHead: maxBlockHeadLag })
                .preferGroup('default', { minHealthy, fallback: 'fallback' })
                .sortByScore(PREFER_FASTEST)
                .stickyPrimary({ hysteresis: 0.10, minSwitchInterval: '30s' })
                .probeExcluded({ reAdmitAfter: '5m', maxConcurrent: 1 });
            }
