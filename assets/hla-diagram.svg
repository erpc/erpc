<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f04e23"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#aab0ba"/>
    </marker>
    <marker id="arrowMut" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b9bcc6"/>
    </marker>
    <style>
      .flowIn  { fill:none; stroke:#f04e23; stroke-width:2.6; stroke-linecap:round; stroke-dasharray:0.1 13; animation:erpcflow 1.05s linear infinite; }
      .flowOut { fill:none; stroke:#ffffff; stroke-width:1.5; stroke-linecap:round; stroke-dasharray:0.1 12; animation:erpcflow 1.05s linear infinite; }
      @keyframes erpcflow { to { stroke-dashoffset:-13; } }
    </style>
  </defs>

  <!-- card -->
  <rect x="4" y="4" width="972" height="552" rx="18" fill="#fffdfc" stroke="#eceaea"/>

  <!-- ======== CLIENTS ======== -->
  <text x="124" y="78" text-anchor="middle" fill="#8a8a93" font-size="11" letter-spacing="2">CLIENTS</text>
  <g>
    <rect x="40" y="124" width="168" height="54" rx="11" fill="#ffffff" stroke="#e2e2e9"/>
    <text x="60" y="148" fill="#17171f" font-size="12.5" font-weight="600">Indexers &amp; pipelines</text>
    <text x="60" y="165" fill="#7a7a84" font-size="10">subgraphs · ETL</text>
  </g>
  <g>
    <rect x="40" y="214" width="168" height="54" rx="11" fill="#ffffff" stroke="#e2e2e9"/>
    <text x="60" y="238" fill="#17171f" font-size="12.5" font-weight="600">Backends &amp; APIs</text>
    <text x="60" y="255" fill="#7a7a84" font-size="10">services · jobs</text>
  </g>
  <g>
    <rect x="40" y="304" width="168" height="54" rx="11" fill="#ffffff" stroke="#e2e2e9"/>
    <text x="60" y="328" fill="#17171f" font-size="12.5" font-weight="600">Apps &amp; frontends</text>
    <text x="60" y="345" fill="#7a7a84" font-size="10">dApps · wallets</text>
  </g>

  <!-- client -> eRPC -->
  <path d="M208,151 C270,151 280,250 352,250" fill="none" stroke="#cdcdd5" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M208,241 C280,241 286,255 352,262" fill="none" stroke="#cdcdd5" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M208,331 C270,331 280,275 352,274" fill="none" stroke="#cdcdd5" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path class="flowIn" d="M208,151 C270,151 280,250 352,250"/>
  <path class="flowIn" d="M208,241 C280,241 286,255 352,262"/>
  <path class="flowIn" d="M208,331 C270,331 280,275 352,274"/>
  <rect x="236" y="183" width="96" height="22" rx="11" fill="#fdeadf" stroke="#f7b79d"/>
  <text x="284" y="198" text-anchor="middle" fill="#c23d18" font-size="10" font-weight="600">JSON-RPC · one URL</text>
  <text x="284" y="225" text-anchor="middle" fill="#8a8a93" font-size="9.5">auth · basic / JWT / SIWE</text>

  <!-- ======== CACHE ======== -->
  <g>
    <path d="M446,30 a60,9 0 0 1 120,0 v40 a60,9 0 0 1 -120,0 z" fill="#f7f4f2" stroke="#dcd6d2"/>
    <ellipse cx="506" cy="30" rx="60" ry="9" fill="#fbf9f8" stroke="#dcd6d2"/>
    <text x="506" y="52" text-anchor="middle" fill="#17171f" font-size="11" font-weight="600">Re-org-aware cache</text>
    <text x="506" y="66" text-anchor="middle" fill="#8a8a93" font-size="9">permanent · read-through</text>
  </g>
  <line x1="506" y1="80" x2="506" y2="96" stroke="#cdcdd5" stroke-width="1.6" marker-start="url(#arrowMut)" marker-end="url(#arrowMut)"/>

  <!-- ======== eRPC CORE ======== -->
  <rect x="354" y="96" width="304" height="326" rx="16" fill="#ffffff" stroke="#f3a17e" stroke-width="2"/>
  <text x="506" y="134" text-anchor="middle" fill="#f04e23" font-size="25" font-weight="700" letter-spacing="0.5">eRPC</text>
  <text x="506" y="153" text-anchor="middle" fill="#7a7a84" font-size="11">fault-tolerant RPC proxy</text>
  <line x1="376" y1="166" x2="636" y2="166" stroke="#efe7e2" stroke-width="1"/>

  <!-- chips -->
  <g font-size="10.5" fill="#33333c" text-anchor="middle">
    <rect x="372" y="180" width="128" height="34" rx="8" fill="#f7f4f2" stroke="#ececea"/><text x="436" y="201">Retries &amp; failover</text>
    <rect x="508" y="180" width="128" height="34" rx="8" fill="#f7f4f2" stroke="#ececea"/><text x="572" y="201">Consensus</text>
    <rect x="372" y="222" width="128" height="34" rx="8" fill="#f7f4f2" stroke="#ececea"/><text x="436" y="243">Hedged requests</text>
    <rect x="508" y="222" width="128" height="34" rx="8" fill="#f7f4f2" stroke="#ececea"/><text x="572" y="243">Integrity checks</text>
    <rect x="372" y="264" width="128" height="34" rx="8" fill="#f7f4f2" stroke="#ececea"/><text x="436" y="285">Method routing</text>
    <rect x="508" y="264" width="128" height="34" rx="8" fill="#f7f4f2" stroke="#ececea"/><text x="572" y="285">Selection policies</text>
    <rect x="372" y="306" width="128" height="34" rx="8" fill="#f7f4f2" stroke="#ececea"/><text x="436" y="327">Rate limits</text>
    <rect x="508" y="306" width="128" height="34" rx="8" fill="#f7f4f2" stroke="#ececea"/><text x="572" y="327">Smart batching</text>
  </g>

  <line x1="376" y1="356" x2="636" y2="356" stroke="#efe7e2" stroke-width="1"/>
  <text x="506" y="377" text-anchor="middle" fill="#8a8a93" font-size="9.5">Unified errors · normalized across providers</text>
  <text x="506" y="395" text-anchor="middle" fill="#8a8a93" font-size="9.5">Observability · Prometheus + Grafana</text>

  <!-- ======== UPSTREAMS ======== -->
  <text x="866" y="78" text-anchor="middle" fill="#8a8a93" font-size="11" letter-spacing="2">UPSTREAMS</text>

  <!-- eRPC -> upstreams -->
  <path d="M658,150 C710,150 720,130 770,130" fill="none" stroke="#f04e23" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M658,210 C712,210 720,206 770,206" fill="none" stroke="#f04e23" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M658,270 C712,270 720,282 770,282" fill="none" stroke="#f04e23" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M658,330 C712,330 720,358 770,358" fill="none" stroke="#aab0ba" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrowGray)"/>
  <path class="flowOut" d="M658,150 C710,150 720,130 770,130"/>
  <path class="flowOut" d="M658,210 C712,210 720,206 770,206"/>
  <path class="flowOut" d="M658,270 C712,270 720,282 770,282"/>

  <text x="712" y="118" text-anchor="middle" fill="#8a8a93" font-size="9">health-aware</text>

  <g>
    <rect x="772" y="104" width="188" height="52" rx="11" fill="#ffffff" stroke="#e2e2e9"/>
    <circle cx="790" cy="130" r="4.5" fill="#16a36a"/>
    <text x="804" y="126" fill="#17171f" font-size="12" font-weight="600">Provider A</text>
    <text x="804" y="142" fill="#7a7a84" font-size="9.5">premium · active</text>
  </g>
  <g>
    <rect x="772" y="180" width="188" height="52" rx="11" fill="#ffffff" stroke="#e2e2e9"/>
    <circle cx="790" cy="206" r="4.5" fill="#16a36a"/>
    <text x="804" y="202" fill="#17171f" font-size="12" font-weight="600">Your node</text>
    <text x="804" y="218" fill="#7a7a84" font-size="9.5">archive · full</text>
  </g>
  <g>
    <rect x="772" y="256" width="188" height="52" rx="11" fill="#ffffff" stroke="#e2e2e9"/>
    <circle cx="790" cy="282" r="4.5" fill="#e0a019"/>
    <text x="804" y="278" fill="#17171f" font-size="12" font-weight="600">Provider B</text>
    <text x="804" y="294" fill="#7a7a84" font-size="9.5">rate-limited · deprioritized</text>
  </g>
  <g>
    <rect x="772" y="332" width="188" height="52" rx="11" fill="#fcfbfb" stroke="#dadbe0" stroke-dasharray="5 4"/>
    <circle cx="790" cy="358" r="4.5" fill="#d24a36"/>
    <text x="804" y="354" fill="#8a8a93" font-size="12" font-weight="600">Provider C</text>
    <text x="804" y="370" fill="#9aa0aa" font-size="9.5">offline · bypassed</text>
  </g>

  <!-- legend -->
  <g font-size="10" fill="#7a7a84">
    <circle cx="360" cy="528" r="4" fill="#16a36a"/><text x="370" y="532">healthy</text>
    <circle cx="452" cy="528" r="4" fill="#e0a019"/><text x="462" y="532">rate-limited</text>
    <circle cx="566" cy="528" r="4" fill="#d24a36"/><text x="576" y="532">offline / bypassed</text>
  </g>
</svg>
