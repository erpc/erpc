<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eRPC Traffic Simulator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles-2.css" />
  <link rel="stylesheet" href="styles-3.css" />
  <link rel="stylesheet" href="styles-flow-v2.css" />
  <link rel="stylesheet" href="styles-policy.css" />
</head>
<body data-theme="dark">
  <div id="root"></div>

  <!-- React + Babel (CDN; no build step) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Vanilla JS modules (loaded synchronously; no Babel needed) -->
  <script src="sim-runtime.js"></script>
  <script src="yaml-util.js"></script>

  <!-- React Context wiring (defines SimProvider + hooks) -->
  <script type="text/babel" src="sim-context.jsx"></script>

  <!-- React components — all consume context via hooks, no props.state -->
  <script type="text/babel" src="flow-stage.jsx"></script>
  <script type="text/babel" src="config-editor.jsx"></script>
  <script type="text/babel" src="charts.jsx"></script>
  <script type="text/babel" src="upstream-knobs.jsx"></script>
  <script type="text/babel" src="right-col.jsx"></script>
  <script type="text/babel" src="top-bar.jsx"></script>
  <script type="text/babel" src="bottom-tabs.jsx"></script>
  <script type="text/babel" src="selection-policy.jsx"></script>
  <script type="text/babel" src="policy-history.jsx"></script>
  <script type="text/babel" src="resizer.jsx"></script>

  <!-- App shell mounts last -->
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
